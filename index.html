<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кальянные Миксы — ХАУС</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper: #F0EDE3;
    --card: #F7F4EA;
    --ink: #2C4A34;
    --ink-dim: #4A6350;
    --text: #2B2B26;
    --soft: #6b6a5f;
    --rule: #CFC9B6;
  }

  body {
    background: var(--paper);
    color: var(--text);
    font-family: 'PT Serif', serif;
    min-height: 100vh;
  }

  .page { max-width: 1080px; margin: 0 auto; padding: 60px 32px 90px; }

  /* HEADER */
  .header { text-align: center; margin-bottom: 46px; }

  .est {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--soft);
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    font-size: clamp(52px, 8vw, 84px);
    letter-spacing: 0.05em;
    color: var(--ink);
    line-height: 1;
    margin-top: 6px;
  }

  .brand-sub {
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink);
    margin-top: 8px;
  }

  .menu-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4.5vw, 38px);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink);
    margin-top: 32px;
  }

  .menu-sub {
    font-style: italic;
    font-size: 15px;
    color: var(--soft);
    margin-top: 6px;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--rule);
    margin: 26px auto 0;
  }

  /* FILTERS */
  .filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 30px;
  }
  .filter-btn {
    background: none;
    border: 1px solid var(--rule);
    color: var(--soft);
    font-family: 'PT Serif', serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .filter-btn:hover { border-color: var(--ink); color: var(--ink); }
  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  .count-text {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--soft);
    margin-top: 16px;
  }

  /* GRID */
  .grid {
    margin-top: 44px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--rule);
    padding: 26px 26px 22px;
    position: relative;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: var(--ink-dim);
    box-shadow: 0 10px 24px rgba(44,74,52,0.08);
  }

  .card.hidden { display: none; }

  .card-tag {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 21px;
    color: var(--ink);
    line-height: 1.2;
  }

  .card-desc {
    font-style: italic;
    font-size: 13px;
    color: var(--soft);
  }

  .card-ingredients {
    font-size: 12.5px;
    color: var(--soft);
    line-height: 1.55;
    padding-top: 10px;
    border-top: 1px dotted var(--rule);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 6px;
  }

  .strength-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--soft);
    margin-bottom: 5px;
  }

  .strength-bar { display: flex; gap: 3px; }
  .strength-pip {
    width: 15px;
    height: 3px;
    background: var(--rule);
  }
  .strength-pip.filled { background: var(--ink); }

  .strength-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--ink);
    line-height: 1;
  }
  .strength-den { font-size: 12px; color: var(--soft); }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="header">
    <div class="est">Est. 2018</div>
    <div class="brand">ХАУС</div>
    <div class="brand-sub">на Волжской 34</div>

    <div class="menu-title">Кальянные миксы</div>
    <p class="menu-sub">готовые сочетания на любой вкус</p>
    <div class="divider"></div>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-cat="all">Все</button>
    </div>
    <div class="count-text" id="count-text"></div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>
const mixes = [
  { cat: "Ягодный",          name: "Лесной Закат",        desc: "Сочные ягоды, смородина и лёгкая свежесть.",   strength: 6,  ingredients: "BB Ягодный сорбет с грейпфрутом 40% · MH Земляника и личи 35% · Sebero Ревень и черная смородина 25%" },
  { cat: "Ягодный",          name: "Малиновый Леденец",   desc: "Сладкий малиновый десерт.",                     strength: 5,  ingredients: "Bliss Малина 40% · MH Ягодные леденцы 35% · Sebero Малиновый Рафаэлло 25%" },
  { cat: "Ягодный",          name: "Клюквенный Джем",     desc: "Кисло-сладкий ягодный вкус.",                   strength: 6,  ingredients: "Morpheus Клюква Джин 30% · Bliss Малина 35% · Sebero Гранат-вишня 35%" },
  { cat: "Фруктовый",        name: "Тропический Рай",     desc: "Тропический коктейль.",                         strength: 6,  ingredients: "MH Банан 35% · BB Кислый ананас 35% · Sebero Арбуз-Дыня 30%" },
  { cat: "Фруктовый",        name: "Экзотический Сад",    desc: "Экзотические фрукты.",                          strength: 6,  ingredients: "Sebero Фейхоа 40% · MH Банан 30% · BB Кислый ананас 30%" },
  { cat: "Фруктовый",        name: "Арбузный Бриз",       desc: "Лёгкий летний вкус.",                           strength: 5,  ingredients: "Sebero Арбуз-Дыня 60% · MH Банан 20% · Sebero Фейхоа 20%" },
  { cat: "Фруктово-ягодный", name: "Ягодный Фреш",        desc: "Яркий фруктово-ягодный.",                       strength: 6,  ingredients: "Sebero Гранат-вишня 40% · MH Клубника, киви и грейпфрут 35% · BB Ягодный сорбет 25%" },
  { cat: "Фруктово-ягодный", name: "Личи Санрайз",        desc: "Личи и гранат.",                                strength: 5,  ingredients: "MH Земляника и личи 45% · Sebero Гранат-вишня 30% · Sebero Фейхоа 25%" },
  { cat: "Фруктово-ягодный", name: "Berry Tropical",      desc: "Тропики и ягоды.",                              strength: 6,  ingredients: "BB Кислый ананас 30% · MH Клубника, киви и грейпфрут 35% · Sebero Ревень и черная смородина 35%" },
  { cat: "Цитрусовый",       name: "Итальянский Лимонад", desc: "Цитрусовый лимонад.",                           strength: 5,  ingredients: "Sebero Лимончелло 45% · MH Апельсин и мандарин 35% · BB Грейпфрут 20%" },
  { cat: "Цитрусовый",       name: "Цитрус Шторм",        desc: "Яркий цитрус.",                                 strength: 7,  ingredients: "BB Грейпфрут 40% · Overdose Кактус-Лайм 30% · MH Апельсин и мандарин 30%" },
  { cat: "Цитрусовый",       name: "Orange Fresh",        desc: "Апельсиновая газировка.",                       strength: 5,  ingredients: "MH Апельсин и мандарин 50% · Sebero Лимончелло 30% · BB Арктический лёд 20%" },
  { cat: "Напитки",          name: "Vanilla Cola",        desc: "Холодная ванильная кола.",                      strength: 5,  ingredients: "Starline Ванильная Кола 45% · Sebero Кола 35% · BB Арктический лёд 20%" },
  { cat: "Напитки",          name: "Тропический Айс Ти",  desc: "Освежающий чай.",                               strength: 5,  ingredients: "MH Чай Эрл Грей 35% · MH Тропический сок 35% · BB Арктический лёд 30%" },
  { cat: "Напитки",          name: "Манго Спайс",         desc: "Манговый напиток.",                             strength: 5,  ingredients: "MH Манговый напиток 50% · MH Тропический сок 30% · BB Арктический лёд 20%" },
  { cat: "Десертный",        name: "Рафаэлло Deluxe",     desc: "Сливочный десерт.",                             strength: 6,  ingredients: "Sebero Малиновый Рафаэлло 40% · BB Какао и маршмеллоу 30% · MH Шоколадное печенье 30%" },
  { cat: "Десертный",        name: "Персиковый Чизкейк",  desc: "Чизкейк с персиком.",                           strength: 7,  ingredients: "BB Персиковый йогурт 45% · BB Лимонные вафли 30% · MH Шоколадное печенье 25%" },
  { cat: "Десертный",        name: "Горячий Шоколад",     desc: "Шоколад с маршмеллоу.",                         strength: 7,  ingredients: "MH Шоколад и мята 35% · BB Какао и маршмеллоу 40% · BB Сливочная кукуруза 25%" },
];

const cats = ["all", ...new Set(mixes.map(m => m.cat))];
const filtersEl = document.getElementById('filters');
const grid = document.getElementById('grid');
const countText = document.getElementById('count-text');

cats.slice(1).forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.cat = cat;
  btn.textContent = cat;
  filtersEl.appendChild(btn);
});

mixes.forEach(mix => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.cat = mix.cat;

  const pips = Array.from({length: 10}, (_, j) =>
    `<div class="strength-pip ${j < mix.strength ? 'filled' : ''}"></div>`
  ).join('');

  card.innerHTML = `
    <div class="card-tag">${mix.cat}</div>
    <div class="card-name">${mix.name}</div>
    <div class="card-desc">${mix.desc}</div>
    <div class="card-ingredients">${mix.ingredients}</div>
    <div class="card-footer">
      <div>
        <div class="strength-label">Крепость</div>
        <div class="strength-bar">${pips}</div>
      </div>
      <div style="text-align:right">
        <span class="strength-num">${mix.strength}</span><span class="strength-den">/10</span>
      </div>
    </div>
  `;
  grid.appendChild(card);
});

let activeFilter = 'all';

function updateCount() {
  const visible = [...grid.querySelectorAll('.card:not(.hidden)')].length;
  const total = mixes.length;
  countText.textContent = activeFilter === 'all' ? `${total} миксов` : `${visible} из ${total}`;
}

filtersEl.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.cat;

  filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  grid.querySelectorAll('.card').forEach(card => {
    card.classList.toggle('hidden', !(activeFilter === 'all' || card.dataset.cat === activeFilter));
  });
  updateCount();
});

updateCount();
</script>
</body>
</html>
