<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кальянные Миксы — ХАУС</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper: #F0EDE3;
    --card: #F7F4EA;
    --ink: #2C4A34;
    --ink-dim: #4A6350;
    --text: #2B2B26;
    --soft: #6b6a5f;
    --rule: #CFC9B6;
  }

  body {
    background: var(--paper);
    color: var(--text);
    font-family: 'PT Serif', serif;
    min-height: 100vh;
  }

  .page { max-width: 1080px; margin: 0 auto; padding: 60px 32px 90px; }

  /* HEADER */
  .header { text-align: center; margin-bottom: 46px; }

  .est {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--soft);
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    font-size: clamp(52px, 8vw, 84px);
    letter-spacing: 0.05em;
    color: var(--ink);
    line-height: 1;
    margin-top: 6px;
  }

  .brand-sub {
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink);
    margin-top: 8px;
  }

  .menu-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4.5vw, 38px);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink);
    margin-top: 32px;
  }

  .menu-sub {
    font-style: italic;
    font-size: 15px;
    color: var(--soft);
    margin-top: 6px;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--rule);
    margin: 26px auto 0;
  }

  /* FILTERS */
  .filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 30px;
  }
  .filter-btn {
    background: none;
    border: 1px solid var(--rule);
    color: var(--soft);
    font-family: 'PT Serif', serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .filter-btn:hover { border-color: var(--ink); color: var(--ink); }
  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  .count-text {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--soft);
    margin-top: 16px;
  }

  /* GRID */
  .grid {
    margin-top: 44px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--rule);
    padding: 26px 26px 22px;
    position: relative;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: var(--ink-dim);
    box-shadow: 0 10px 24px rgba(44,74,52,0.08);
  }

  .card.hidden { display: none; }

  .card-tag {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 21px;
    color: var(--ink);
    line-height: 1.2;
  }

  .card-desc {
    font-style: italic;
    font-size: 13px;
    color: var(--soft);
  }

  .card-ingredients {
    font-size: 12.5px;
    color: var(--soft);
    line-height: 1.55;
    padding-top: 10px;
    border-top: 1px dotted var(--rule);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 6px;
  }

  .strength-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--soft);
    margin-bottom: 5px;
  }

  .strength-bar { display: flex; gap: 3px; }
  .strength-pip {
    width: 15px;
    height: 3px;
    background: var(--rule);
  }
  .strength-pip.filled { background: var(--ink); }

  .strength-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--ink);
    line-height: 1;
  }
  .strength-den { font-size: 12px; color: var(--soft); }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="header">
    <div class="est">Est. 2018</div>
    <div class="brand">ХАУС</div>
    <div class="brand-sub">на Волжской 34</div>

    <div class="menu-title">Кальянные миксы</div>
    <p class="menu-sub">готовые сочетания на любой вкус</p>
    <div class="divider"></div>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-cat="all">Все</button>
    </div>
    <div class="count-text" id="count-text"></div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>
const mixes = [
  { cat: "Ягодные",          name: "Виноградно-малиновый сорбет",     ingredients: "Малина 40% + Виноградный Чупа-Чупс 40% + Тростниковая Мята 20%" },
  { cat: "Ягодные",          name: "Насыщенный гранат-вишня",         ingredients: "Гранат-Вишня 50% + Клубника 30% + Малина 20%" },
  { cat: "Ягодные",          name: "Ягодный Раффаэлло",               ingredients: "Малиновый Рифаэлло 50% + Клубника 30% + Сливочное Мороженое 20%" },
  { cat: "Ягодные",          name: "Темные ягоды с прохладой",        ingredients: "Гранат и Виноград 60% + Ice Baby 30% + Тростниковая Мята 10%" },
  { cat: "Ягодные",          name: "Нежный ягодный смузи",            ingredients: "Клубника 40% + Малина 40% + Персиковый Йогурт 20%" },
  { cat: "Ягодные",          name: "Пряная вишня и малина",           ingredients: "Гранат-Вишня 50% + Малина 40% + Эстрагон 10%" },
  { cat: "Фруктовые",        name: "Тропический кислый взрыв",        ingredients: "Манго Слинг 40% + Настоящая Маракуйя 40% + Кислый Ананас 20%" },
  { cat: "Фруктовые",        name: "Летний арбуз с киви",             ingredients: "Арбуз-Дыня 50% + Киви-Смузи 40% + Тростниковая Мята 10%" },
  { cat: "Фруктовые",        name: "Сливочная экзотика",              ingredients: "Марула 40% + Яркая Папайя 40% + Ананасовые Колечки 20%" },
  { cat: "Фруктовые",        name: "Кислый яблочно-ананасовый микс",  ingredients: "Кислый Ананас 40% + Яблочные Конфеты 40% + Фейхоа 20%" },
  { cat: "Фруктовые",        name: "Тропический сок с маракуйей",     ingredients: "Тропический Сок 50% + Настоящая Маракуйя 30% + Манго Слинг 20%" },
  { cat: "Фруктовые",        name: "Арбузная фейхоа с зеленью",       ingredients: "Фейхоа 40% + Арбуз-Дыня 40% + Базилик 20%" },
  { cat: "Фруктово-Ягодные", name: "Свежий Пинкман-Смузи",            ingredients: "Пинкман 50% + Киви-Смузи 30% + Клубника 20%" },
  { cat: "Фруктово-Ягодные", name: "Рокетмэн с малиновым акцентом",   ingredients: "Рокетмэн 50% + Малина 40% + Тростниковая Мята 10%" },
  { cat: "Фруктово-Ягодные", name: "Клубнично-ананасовый шейк",       ingredients: "Клубника 40% + Ананасовые Колечки 40% + Персиковый Йогурт 20%" },
  { cat: "Фруктово-Ягодные", name: "Арбузно-гранатовый микс",         ingredients: "Арбуз-Дыня 50% + Гранат-Вишня 30% + Малина 20%" },
  { cat: "Фруктово-Ягодные", name: "Экзотический виноград",           ingredients: "Виноградный Чупа-Чупс 40% + Яркая Папайя 40% + Ice Baby 20%" },
  { cat: "Фруктово-Ягодные", name: "Ягодная маракуйя",                ingredients: "Ice Baby 40% + Настоящая Маракуйя 30% + Клубника 30%" },
  { cat: "Напитки",          name: "Цитрусовый Эрл Грей",             ingredients: "Чай Эрл Грей 60% + Апельсин и мандарин 30% + Крепкий Лимон-Лайм 10%" },
  { cat: "Напитки",          name: "Домашний Тархун",                 ingredients: "Эстрагон 50% + Крепкий Лимон-Лайм 30% + Киви-Смузи 20%" },
  { cat: "Напитки",          name: "Шот Лимончелло",                  ingredients: "Лимончелло 50% + Кактус-Лайм 30% + Тростниковая Мята 20%" },
  { cat: "Напитки",          name: "Тропическая Сангрия",             ingredients: "Гранат и Виноград 40% + Тропический Сок 40% + Апельсин и мандарин 20%" },
  { cat: "Напитки",          name: "Пряный базиликовый лимонад",      ingredients: "Крепкий Лимон-Лайм 40% + Базилик 30% + Арбуз-Дыня 30%" },
  { cat: "Напитки",          name: "Ягодный чай с бергамотом",        ingredients: "Чай Эрл Грей 50% + Малина 40% + Тростниковая Мята 10%" },
  { cat: "Десерты",          name: "Шоколадно-коричный спешл",        ingredients: "Булочка с корицей 40% + Шоколадное Печенье 40% + Сливочное Мороженое 20%" },
  { cat: "Десерты",          name: "Кокосовый Раффаэлло",             ingredients: "Малиновый Рифаэлло 50% + Кокосовый Шейк 30% + Сливочное Мороженое 20%" },
  { cat: "Десерты",          name: "Лимонно-вафельный пай",           ingredients: "Лимонные Вафли 50% + Сливочное Мороженое 30% + Булочка с корицей 20%" },
  { cat: "Десерты",          name: "Шоколадный попкорн",              ingredients: "Какао и Маршмеллоу 40% + Оригинальный Попкорн 40% + Сливочное Мороженое 20%" },
  { cat: "Десерты",          name: "Сливочно-кукурузный йогурт",      ingredients: "Персиковый Йогурт 60% + Сливочная Кукуруза 20% + Кокосовый Шейк 20%" },
  { cat: "Десерты",          name: "Мятно-шоколадный десерт",         ingredients: "Шоколад и Мята 50% + Шоколадное Печенье 30% + Сливочное Мороженое 20%" },
  { cat: "Цитрусовые",       name: "Цитрусовый фреш",                 ingredients: "Апельсин и мандарин 50% + Крепкий Лимон-Лайм 30% + Кактус-Лайм 20%" },
  { cat: "Цитрусовые",       name: "Яркий Пинкман Цитрус",            ingredients: "Пинкман 50% + Апельсин и мандарин 30% + Крепкий Лимон-Лайм 20%" },
  { cat: "Цитрусовые",       name: "Освежающий Кактус-Лайм",          ingredients: "Кактус-Лайм 50% + Лимончелло 30% + Тростниковая Мята 20%" },
  { cat: "Цитрусовые",       name: "Лимонно-апельсиновый пирог",      ingredients: "Апельсин и мандарин 40% + Лимонные Вафли 40% + Сливочное Мороженое 20%" },
  { cat: "Цитрусовые",       name: "Кислый Рокетмэн",                 ingredients: "Рокетмэн 50% + Крепкий Лимон-Лайм 30% + Кислый Ананас 20%" },
  { cat: "Цитрусовые",       name: "Пряный Лимончелло",               ingredients: "Лимончелло 50% + Апельсин и мандарин 30% + Базилик 20%" },
];

const cats = ["all", ...new Set(mixes.map(m => m.cat))];
const filtersEl = document.getElementById('filters');
const grid = document.getElementById('grid');
const countText = document.getElementById('count-text');

cats.slice(1).forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.cat = cat;
  btn.textContent = cat;
  filtersEl.appendChild(btn);
});

mixes.forEach(mix => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.cat = mix.cat;

  card.innerHTML = `
    <div class="card-tag">${mix.cat}</div>
    <div class="card-name">${mix.name}</div>
    <div class="card-ingredients">${mix.ingredients}</div>
  `;
  grid.appendChild(card);
});

let activeFilter = 'all';

function updateCount() {
  const visible = [...grid.querySelectorAll('.card:not(.hidden)')].length;
  const total = mixes.length;
  countText.textContent = activeFilter === 'all' ? `${total} миксов` : `${visible} из ${total}`;
}

filtersEl.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.cat;

  filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  grid.querySelectorAll('.card').forEach(card => {
    card.classList.toggle('hidden', !(activeFilter === 'all' || card.dataset.cat === activeFilter));
  });
  updateCount();
});

updateCount();
</script>
</body>
</html>
