<style>
  :root {
    --coal: #080806;
    --ember: #1C1208;
    --gold: #C8912A;
    --gold-dim: #8A6218;
    --smoke: #9E8E78;
    --ash: #4A4035;
    --cream: #F2EDE4;
    --paper: #EDE6D9;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--coal);
    color: var(--cream);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient smoke particles */
  .smoke-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .smoke-bg::before, .smoke-bg::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.06;
    animation: drift 18s ease-in-out infinite alternate;
  }
  .smoke-bg::before {
    width: 600px; height: 600px;
    background: radial-gradient(circle, var(--gold), transparent 70%);
    top: -100px; left: -100px;
  }
  .smoke-bg::after {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #8B3A0F, transparent 70%);
    bottom: -100px; right: -100px;
    animation-delay: -9s;
  }
  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    100% { transform: translate(60px, 40px) scale(1.15); }
  }

  /* ─── Header ─── */
  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 72px 24px 48px;
  }
  .header-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .ornament-line {
    flex: 1;
    max-width: 120px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim));
  }
  .ornament-line.right {
    background: linear-gradient(to left, transparent, var(--gold-dim));
  }
  .ornament-diamond {
    width: 8px; height: 8px;
    border: 1px solid var(--gold);
    transform: rotate(45deg);
  }
  .header-eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.8;
  }
  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(38px, 8vw, 72px);
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--cream);
    line-height: 1.1;
    margin: 12px 0 8px;
  }
  h1 span {
    color: var(--gold);
  }
  .header-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    font-weight: 300;
    color: var(--smoke);
    letter-spacing: 0.04em;
  }
  .header-divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, var(--gold-dim), transparent);
    margin: 32px auto 0;
  }

  /* ─── Category tabs ─── */
  .tabs-wrapper {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 0 24px;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 48px;
  }
  .tab-btn {
    background: none;
    border: 1px solid var(--ash);
    color: var(--smoke);
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 0.06em;
    padding: 8px 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .tab-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tab-btn:hover { border-color: var(--gold-dim); color: var(--cream); }
  .tab-btn:hover::before { opacity: 0.08; }
  .tab-btn.active {
    border-color: var(--gold);
    color: var(--gold);
  }
  .tab-btn.active::before { opacity: 0.05; }

  /* ─── Grid ─── */
  .cards-container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 80px;
    columns: 3;
    column-gap: 24px;
  }
  @media (max-width: 900px) { .cards-container { columns: 2; } }
  @media (max-width: 580px) { .cards-container { columns: 1; } }

  /* ─── Card ─── */
  .card {
    break-inside: avoid;
    margin-bottom: 24px;
    background: var(--ember);
    border: 1px solid #2A2015;
    position: relative;
    overflow: hidden;
    transition: transform 0.35s cubic-bezier(.22,.68,0,1.2), border-color 0.3s;
    cursor: default;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200,145,42,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  /* ember bottom border – the signature element */
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.35s;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--gold-dim);
  }
  .card:hover::after { opacity: 1; }

  /* smoke wisp on hover */
  .card .wisp {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 60px;
    background: radial-gradient(circle, rgba(200,145,42,0.15), transparent 70%);
    border-radius: 50%;
    filter: blur(12px);
    opacity: 0;
    transition: opacity 0.4s, bottom 0.4s;
    pointer-events: none;
  }
  .card:hover .wisp {
    opacity: 1;
    bottom: -10px;
  }

  .card-inner { padding: 24px 22px 20px; }

  .card-category {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-category::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--ash);
  }

  .card-title {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.04em;
    line-height: 1.35;
    margin-bottom: 4px;
  }
  .card-subtitle {
    font-size: 13px;
    font-style: italic;
    color: var(--smoke);
    margin-bottom: 18px;
    line-height: 1.4;
  }

  .card-ingredients {
    list-style: none;
    margin-bottom: 18px;
  }
  .card-ingredients li {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    font-size: 14px;
    font-weight: 300;
    color: var(--paper);
    line-height: 1.8;
    border-bottom: 1px solid #1E1810;

  .card-ingredients li:last-child { border-bottom: none; }
  .ing-brand {
    color: var(--smoke);
    font-size: 11px;
    font-style: italic;
    white-space: nowrap;
    font-family: 'Inter', sans-serif;

  .ing-flavor { flex: 1; }
  .ing-pct {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--gold);
    font-weight: 600;

  .card-desc {
    font-size: 13.5px;
    font-weight: 300;
    color: var(--smoke);
    line-height: 1.65;
    font-style: italic;
    border-top: 1px solid #2A2015;
    padding-top: 14px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
  }
  .strength-label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ash);
  }
  .strength-pips {
    display: flex;
    gap: 3px;
    align-items: center;
  }
  .pip {
    width: 14px; height: 3px;
    background: var(--ash);
    transition: background 0.2s;
  }
  .pip.on { background: var(--gold); }

  /* tip block */
  .card-tip {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(200,145,42,0.06);
    border-left: 2px solid var(--gold-dim);
    font-size: 12.5px;
    color: var(--smoke);
    line-height: 1.55;
    font-style: italic;
  }
  .card-tip strong {
    font-style: normal;
    color: var(--gold);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
    font-family: 'Inter', sans-serif;
  }

  /* hidden cards */

  /* ─── Footer ─── */

    position: relative;
    z-index: 1;
    text-align: center;
    padding: 32px 24px 48px;
    border-top: 1px solid #1E1810;
  }

    font-size: 12px;
    color: var(--ash);
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>

function renderPips(strength) {
  const total = 10;
  const filled = Math.round(strength);
  let html = '';
  for (let i = 0; i < total; i++) {
    html += `<div class="pip ${i < filled ? 'on' : ''}"></div>`;
  }
  return html;
}

function renderCards(filter) {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  const filtered = filter === 'all' ? mixes : mixes.filter(m => m.cat === filter);
  filtered.forEach(m => {
    const tipHtml = m.tip
      ? `<div class="card-tip"><strong>Совет мастера</strong>${m.tip}</div>`
      : '';
    container.innerHTML += `
      <div class="card">
        <div class="wisp"></div>
        <div class="card-inner">
          <div class="card-category">${m.catLabel}</div>
          <div class="card-title">${m.title}</div>
          <div class="card-subtitle">${m.subtitle}</div>
          <ul class="card-ingredients">
            ${m.ingredients.map(ing => `
              <li>
                <span class="ing-brand">${ing.brand}</span>
                <span class="ing-flavor">${ing.flavor}</span>
                <span class="ing-pct">${ing.pct}%</span>
              </li>`).join('')}
          </ul>
          <div class="card-desc">${m.desc}</div>
          ${tipHtml}
          <div class="card-footer">
            <span class="strength-label">Крепость</span>
            <div class="strength-pips">${renderPips(m.strength)}</div>
          </div>
        </div>
      </div>`;
  });
}

renderCards('all');

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.cat);
  });
});
